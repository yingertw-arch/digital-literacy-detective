<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>數位素養偵探社｜沈知夏的藍色檔案</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <section class="cover-screen" id="coverScreen">
    <div class="cover-art">
      <img src="assets/hero.png" alt="沈知夏在圖書館打開藍色檔案夾">
      <div class="cover-plaque">
        <p>DIGITAL LITERACY DETECTIVE</p>
        <h1>數位素養偵探社</h1>
        <span>THE BLUE CASE FILE</span>
      </div>
    </div>
    <div class="cover-login">
      <h2>互動式閱讀解謎闖關遊戲</h2>
      <p>遊戲設計 / 海山國小數位素養課程</p>
      <label>玩家稱謂
        <input id="coverName" maxlength="12" placeholder="請輸入稱謂，例如：小蘇同學">
      </label>
      <small>稱謂會出現在遊戲頁與最後個人結案證書中。</small>
      <button class="cover-start" type="button" onclick="startFromCover()">開始遊戲</button>
    </div>
  </section>

  <div class="app-layout hidden" id="gameApp">
    <main class="main">
      <section class="score-strip">
        <label>
          <span>玩家稱謂</span>
          <input id="playerName" value="" maxlength="12" placeholder="尚未登錄">
        </label>
        <div><span>偵探素養</span><strong id="score">0</strong></div>
        <div><span>稱號</span><strong id="rank">見習偵探</strong></div>
        <button id="hintBtn" type="button">提示 -5</button>
      </section>

      <section class="progress-strip" aria-label="闖關進度">
        <div id="progressSteps"></div>
      </section>

      <section id="stage" class="stage" aria-live="polite"></section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
